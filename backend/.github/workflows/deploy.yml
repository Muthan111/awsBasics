name: Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 459247205877.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t cloud-learning .

      - name: Tag Docker image
        run: |
          docker tag awsbasics-app:latest 459247205877.dkr.ecr.ap-south-1.amazonaws.com/cloud-learning:latest

      - name: Push Docker image
        run: |
          docker push 459247205877.dkr.ecr.ap-south-1.amazonaws.com/cloud-learning:latest